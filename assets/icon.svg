<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" ry="52" fill="#1a1a2e"/>

  <!-- Outer ring (torrent swarm) -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#0f3460" stroke-width="12"/>

  <!-- Download arrow shaft -->
  <line x1="128" y1="52" x2="128" y2="160" stroke="#e94560" stroke-width="18" stroke-linecap="round"/>

  <!-- Arrow head -->
  <polyline points="80,126 128,174 176,126" fill="none" stroke="#e94560" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Base / tray line -->
  <line x1="72" y1="200" x2="184" y2="200" stroke="#e94560" stroke-width="18" stroke-linecap="round"/>

  <!-- Peer dots -->
  <circle cx="42"  cy="90"  r="10" fill="#e94560" opacity="0.6"/>
  <circle cx="214" cy="90"  r="10" fill="#e94560" opacity="0.6"/>
  <circle cx="38"  cy="145" r="10" fill="#e94560" opacity="0.4"/>
  <circle cx="218" cy="145" r="10" fill="#e94560" opacity="0.4"/>
</svg>
