name: Build and Release

on:
  push:
    branches:
      - main # Triggers whenever code is pushed or merged into main
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Build & Package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: ubuntu-latest
            target: package-linux
            artifact: "*linux.tar.gz"
          - os: macos-latest
            target: package-mac
            artifact: "*mac.tar.gz"
          - os: windows-latest
            target: package-windows
            artifact: "*windows.zip"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Get Version from Makefile
        id: version
        shell: bash
        # This grabs "1.0.0" from your "VERSION = 1.0.0" line and saves it as an environment variable
        run: |
          MAKE_VERSION=$(grep '^VERSION' Makefile | cut -d '=' -f2 | tr -d ' ')
          echo "VERSION=$MAKE_VERSION" >> $GITHUB_ENV

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev librsvg2-bin

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install librsvg

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install inkscape zip --no-progress

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Run Tests
        run: make test

      - name: Build and Package
        # Uses the version we extracted from the Makefile
        run: make ${{ matrix.target }} VERSION=${{ env.VERSION }}
        shell: bash

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }} # Automatically creates or updates the tag (e.g., v1.0.0)
          target_commitish: main        # Tells GitHub to tie the release to the main branch
          files: ${{ matrix.artifact }}
          generate_release_notes: true